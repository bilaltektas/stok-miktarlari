<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depo Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
  height:100vh;
}

header{
  background:#2f3640;
  color:#fff;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.screen{
  display:none;
  height:calc(100vh - 50px); /* üst header hariç tüm ekran */
}
.screen.active{display:block;}

.fade{animation:fade .2s ease-in-out;}
@keyframes fade{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  padding:12px;
}

.btn{
  background:#fff;
  padding:18px;
  border-radius:14px;
  font-weight:bold;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.2s;
}

.btn:active{transform:scale(.97);}

/* TOP */
.top{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.back{
  background:#40739e;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
}

iframe, object{
  width:100%;
  height:100%;
  border:0;
}
</style>
</head>

<body>

<header id="title">ANA SAYFA</header>

<!-- ANA SAYFA -->
<div id="home" class="screen active fade">
  <div class="menu">
    <div class="btn" onclick="openMenu('HAMMADDE')">HAMMADDE (PDF)</div>
    <div class="btn" onclick="openMenu('MALKABUL')">MAL KABUL</div>
  </div>
</div>

<!-- HAMMADDE PDF -->
<div id="hammadde" class="screen fade">
  <div class="top">
    <button class="back" onclick="backHome()">← Ana Sayfa</button>
  </div>
  <iframe 
    src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pub?gid=185627105&single=true&output=pdf">
  </iframe>
</div>

<!-- MAL KABUL -->
<div id="malkabul" class="screen fade">
  <div class="top">
    <button class="back" onclick="backHome()">← Ana Sayfa</button>
  </div>
  <p>Mal kabul ekranı burada olacak.</p>
</div>

<script>
function openMenu(type){
  document.getElementById("home").classList.remove("active");
  document.getElementById(type.toLowerCase()).classList.add("active");
  document.getElementById("title").innerText=type;
}

function backHome(){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("home").classList.add("active");
  document.getElementById("title").innerText="ANA SAYFA";
}
</script>

</body>
</html>
