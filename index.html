<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sanita Stok Kiosk</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  height:100dvh;
  overflow:hidden;
  background:#0f172a;
  color:white;
}

/* PERFORMANS (hafif) */
*{will-change:transform}

/* INTRO (SADECE FIX) */
#intro{
  position:fixed; /* absolute -> fixed */
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b1220;
  z-index:9999; /* artırıldı */
  animation: introFade 3s ease forwards;
}

#intro img{
  width:220px;
  filter: drop-shadow(0 0 25px rgba(255,255,255,0.12));
  animation: logoPop 1.2s ease;
}

@keyframes logoPop{
  0%{transform:scale(0.9);opacity:0}
  100%{transform:scale(1);opacity:1}
}

/* DAHA STABİL FADE */
@keyframes introFade{
  0%{opacity:1}
  70%{opacity:1}
  99%{opacity:0}
  100%{
    opacity:0;
    visibility:hidden;
    pointer-events:none;
  }
}

/* APP */
#app{
  height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr;
  opacity:0;
  animation: appIn 1s ease forwards;
  animation-delay:2.8s;
}

@keyframes appIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* TOP */
#topBar{
  display:flex;
  justify-content:center;
  padding:12px;
  background:rgba(0,0,0,0.5);
}

.homeBtn{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  font-size:22px;
  color:white;
}

/* MENU */
.menu{
  display:flex;
  flex-direction:column;
  height:100%;
}

.card{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(20px,4vw,26px); /* responsive */
  font-weight:bold;
  transition:all 0.4s ease;
}

.card:active{transform:scale(0.98)}

.stok{background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.mal{background:linear-gradient(135deg,#f97316,#ef4444);}

/* SUB */
.sub{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px,2.8vw,20px); /* responsive */
  font-weight:bold;
  transition:all 0.4s ease;
  animation: slideIn 0.6s ease;
}

@keyframes slideIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.hidden{display:none!important;}

/* RENKLER */
.mam{background:#0ea5e9;}
.hm{background:#4338ca;}
.opp{background:#dc2626;}
.omk{background:#2563eb;}
.pet{background:#15803d;}
.mh1{background:#7c3aed;}
.mh2{background:#be185d;}

/* SHEET */
#sheet{
  height:100%;
  padding:10px;
  position:relative;
}

iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:16px;
}

/* LOADER (YENİ) */
#loader{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  background:rgba(15,23,42,0.7);
  backdrop-filter:blur(8px);
}

.loader-ring{
  width:70px;
  height:70px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.1);
  border-top:4px solid #38bdf8;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.loader-text{
  margin-top:10px;
  font-size:16px;
  opacity:0.8;
}
</style>
</head>

<body>

<div id="intro">
  <img src="https://www.sanitagida.com/img/beyazlogo.png">
</div>

<div id="app">

  <div id="topBar">
    <button class="homeBtn" onclick="home()">🏠</button>
  </div>

  <div id="main" class="menu hidden">
    <div class="card stok" onclick="openSub('stok')">STOK MİKTARLARI</div>
    <div class="card mal" onclick="openSub('mal')">MAL KABUL</div>
  </div>

  <div id="stok" class="menu hidden">
    <div class="sub mam" onclick="openSheet(urls.mam,'Son ürün miktarlarını inceleyebilirsiniz.')">MAMÜLLER</div>
    <div class="sub hm" onclick="openSheet(urls.hm,'Hammadde Miktarlarını inceleyebilirsiniz.')">HAMMADDELER</div>
    <div class="sub opp" onclick="openSheet(urls.opp,'Bobin Miktarlarını inceleyebilirsiniz.')">BOBİNLER</div>
    <div class="sub omk" onclick="openSheet(urls.omk,'Koli Miktarlarını inceleyebilirsiniz.')">KOLİLER</div>
    <div class="sub pet" onclick="openSheet(urls.pet,'PET - CAM ve KAPAK Miktarlarını inceleyebilirsiniz.')">PET-CAM-KAPAK</div>
  </div>

  <div id="mal" class="menu hidden">
    <div class="sub mh1" onclick="openSheet(urls.mh1,'Mal Kabulü gerçekleşen hammaddeleri inceyebilirsiniz.')">GELEN HAMMADDE</div>
    <div class="sub mh2" onclick="openSheet(urls.mh2,'Mal kabulü gerçekleşen ambalaj , koli , kapak , şişe ve benzeri malzemeleri inceleyebilirsiniz.')">YARDIMCI MALZEME</div>
  </div>

  <div id="sheet" class="hidden">
    <div id="loader">
      <div class="loader-ring"></div>
      <div class="loader-text">Yükleniyor...</div>
    </div>
    <iframe id="frame"></iframe>
  </div>

</div>

<script>
const urls={
 mam:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=1484746316&single=true",
 hm:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=185627105&single=true",
 opp:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=326121089&single=true",
 omk:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=2101965769&single=true",
 pet:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=1845266626&single=true",
 mh1:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=949894360&single=true",
 mh2:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=908017234&single=true"
};

function openSub(type){
  document.getElementById("main").classList.add("hidden");
  document.getElementById(type).classList.remove("hidden");
}

function openSheet(url,text){
  document.getElementById("stok").classList.add("hidden");
  document.getElementById("mal").classList.add("hidden");
  document.getElementById("sheet").classList.remove("hidden");

  const frame=document.getElementById("frame");
  const loader=document.getElementById("loader");

  loader.style.display="flex";
  frame.src=url;

  frame.onload=()=> loader.style.display="none";

  speak(text);
}

function home(){
  document.getElementById("sheet").classList.add("hidden");
  document.getElementById("stok").classList.add("hidden");
  document.getElementById("mal").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");
}

function speak(text){
  const msg=new SpeechSynthesisUtterance(text);
  msg.lang="tr-TR";
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("main").classList.remove("hidden");
  },2800);
});
</script>

</body>
</html>
