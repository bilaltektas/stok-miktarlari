<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depo Panel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f6fa;
}

header{
  background:#2f3640;
  color:#fff;
  padding:14px;
  text-align:center;
  font-weight:bold;
}

.screen{display:none;padding:12px;}
.screen.active{display:block;}

.fade{animation:fade .2s ease-in-out;}
@keyframes fade{
  from{opacity:0;transform:translateY(6px)}
  to{opacity:1;transform:translateY(0)}
}

/* MENU */
.menu{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.btn{
  background:#fff;
  padding:18px;
  border-radius:14px;
  font-weight:bold;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
  cursor:pointer;
  transition:.2s;
}

.btn:active{transform:scale(.97);}

/* TOP */
.top{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.back{
  background:#40739e;
  color:#fff;
  border:none;
  padding:10px;
  border-radius:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

/* CARDS */
.list{
  display:grid;
  gap:10px;
}

.card{
  background:#fff;
  padding:12px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,.08);
  border-left:6px solid green;
}

/* RESPONSIVE */
@media(min-width:768px){
  .menu{grid-template-columns:1fr 1fr}
}
</style>
</head>

<body>

<header id="title">ANA SAYFA</header>

<!-- HOME -->
<div id="home" class="screen active fade">
  <div class="menu">
    <div class="btn" onclick="openMenu('STOK')">STOK MİKTARLARI</div>
    <div class="btn" onclick="openMenu('MALKABUL')">MAL KABUL</div>
  </div>
</div>

<!-- SUB -->
<div id="sub" class="screen fade">
  <div class="top">
    <button class="back" onclick="backHome()">←</button>
  </div>
  <div id="submenu" class="menu"></div>
</div>

<!-- TABLE -->
<div id="table" class="screen fade">
  <div class="top">
    <button class="back" onclick="backSub()">←</button>
    <input id="search" placeholder="Ara..." onkeyup="render()">
  </div>
  <div id="list" class="list"></div>
</div>

<script>
/* =========================
   GOOGLE SHEETS CSV LINKS
   (Publish to web - CSV)
========================= */
const SHEETS = {
  "HAMMADDE":
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pub?gid=185627105&single=true&output=csv",

  "OPP-BOBIN":
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pub?gid=326121089&single=true&output=csv"
};

const MENUS = {
  STOK: ["HAMMADDE","OPP-BOBIN"],
  MALKABUL: []
};

let data=[];

/* =========================
   NAVIGATION
========================= */
function openMenu(type){
  document.getElementById("home").classList.remove("active");
  document.getElementById("sub").classList.add("active");
  document.getElementById("title").innerText=type;

  const box=document.getElementById("submenu");
  box.innerHTML="";

  MENUS[type].forEach(x=>{
    const d=document.createElement("div");
    d.className="btn";
    d.innerText=x;
    d.onclick=()=>loadSheet(x);
    box.appendChild(d);
  });
}

function backHome(){
  document.getElementById("sub").classList.remove("active");
  document.getElementById("home").classList.add("active");
  document.getElementById("title").innerText="ANA SAYFA";
}

function backSub(){
  document.getElementById("table").classList.remove("active");
  document.getElementById("sub").classList.add("active");
}

/* =========================
   FETCH CSV
========================= */
async function loadSheet(name){
  const url=SHEETS[name];
  if(!url){
    alert("Sheet linki yok");
    return;
  }

  document.getElementById("sub").classList.remove("active");
  document.getElementById("table").classList.add("active");
  document.getElementById("title").innerText=name;

  try{
    const res=await fetch(url);
    const text=await res.text();
    data=parseCSV(text);
    render();
  }catch(e){
    alert("Veri çekilemedi (Google Sheets erişim sorunu)");
    console.error(e);
  }
}

/* =========================
   CSV PARSER
========================= */
function parseCSV(text){
  const lines=text.trim().split("\n");
  const headers=lines[0].split(",");

  return lines.slice(1).map(line=>{
    const values=line.split(",");
    let obj={};
    headers.forEach((h,i)=>{
      obj[h.trim()]=(values[i]||"").replace(/"/g,"").trim();
    });
    return obj;
  });
}

/* =========================
   RENDER
========================= */
function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const box=document.getElementById("list");
  box.innerHTML="";

  data
  .filter(x=>JSON.stringify(x).toLowerCase().includes(q))
  .forEach(x=>{
    const stok=Number(x.Stok)||0;
    let color="green";
    if(stok<5) color="red";
    else if(stok<20) color="orange";

    const d=document.createElement("div");
    d.className="card";
    d.style.borderLeft="6px solid "+color;

    d.innerHTML=`
      <b>${x.Ürün || "Ürün"}</b><br>
      <small>${x.Kategori || "-"}</small><br>
      <small>${x.Açıklama || "-"}</small><br>
      <b>Stok: ${stok}</b>
    `;
    box.appendChild(d);
  });
}
</script>

</body>
</html>
