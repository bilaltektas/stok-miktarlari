<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sanita Stok Kiosk</title>

<style>
body{
  margin:0;
  font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial;
  height:100dvh;
  overflow:hidden;
  background:#0f172a;
  color:white;
}

/* =========================
   INTRO (DEĞİŞMEDİ)
========================= */
#intro{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0b1220;
  z-index:9999;
  animation:introFade 3s ease forwards;
}

#intro img{
  width:220px;
  animation:logoPop 1.2s ease;
  filter:drop-shadow(0 10px 30px rgba(255,255,255,0.15));
}

@keyframes logoPop{
  0%{transform:scale(.85);opacity:0}
  100%{transform:scale(1);opacity:1}
}

@keyframes introFade{
  0%{opacity:1}
  80%{opacity:1}
  100%{opacity:0;visibility:hidden}
}

/* =========================
   APP
========================= */
#app{
  height:100dvh;
  display:grid;
  grid-template-rows:auto 1fr;
  opacity:0;
  animation:appIn .8s ease forwards;
  animation-delay:2.6s;
}

@keyframes appIn{
  from{opacity:0;transform:scale(.98)}
  to{opacity:1;transform:scale(1)}
}

/* =========================
   TOP BAR
========================= */
#topBar{
  display:flex;
  justify-content:center;
  padding:12px;
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(10px);
}

.homeBtn{
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,#4f46e5,#7c3aed);
  font-size:22px;
  color:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* =========================
   MENU
========================= */
.menu{
  display:flex;
  flex-direction:column;
  height:100%;
}

.card{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(22px,4vw,28px);
  font-weight:700;
  transition:.25s ease;
}

.card:active{
  transform:scale(.97);
  filter:brightness(1.05);
}

.stok{background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.mal{background:linear-gradient(135deg,#f97316,#ef4444);}

.sub{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(16px,2.5vw,22px);
  font-weight:700;
  transition:.25s ease;
}

.sub:active{
  transform:scale(.97);
  filter:brightness(1.08);
}

.hidden{display:none!important;}

/* renkler */
.mam{background:#0ea5e9;}
.hm{background:#4338ca;}
.opp{background:#dc2626;}
.omk{background:#2563eb;}
.pet{background:#15803d;}
.mh1{background:#7c3aed;}
.mh2{background:#be185d;}

/* =========================
   SHEET FRAME (PREMIUM)
========================= */
#sheet{
  height:100%;
  padding:14px;
  position:relative;
  animation:pageIn .35s cubic-bezier(.22,1,.36,1);
}

@keyframes pageIn{
  from{opacity:0;transform:translateY(18px) scale(.98);filter:blur(6px)}
  to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}

/* GLASS DEVICE FRAME */
.frame-shell{
  width:100%;
  height:100%;
  border-radius:22px;
  padding:10px;

  background:linear-gradient(145deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
  box-shadow:
    0 25px 60px rgba(0,0,0,0.55),
    inset 0 1px 0 rgba(255,255,255,0.08);

  backdrop-filter:blur(14px);
}

iframe{
  width:100%;
  height:100%;
  border:none;
  border-radius:18px;
  background:white;
  box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

/* =========================
   AI LOADER (YENİ)
========================= */
#loader{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;

  background:rgba(15,23,42,0.72);
  backdrop-filter:blur(22px);
}

.ai-core{
  width:90px;
  height:90px;
  border-radius:50%;
  position:relative;
  background:radial-gradient(circle, rgba(56,189,248,0.25), transparent 70%);
  box-shadow:0 0 40px rgba(56,189,248,0.25);
  animation:corePulse 1.6s infinite ease-in-out;
}

@keyframes corePulse{
  0%,100%{transform:scale(1);opacity:.6}
  50%{transform:scale(1.15);opacity:1}
}

.ai-ring{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid rgba(56,189,248,0.2);
  animation:spin 2.5s linear infinite;
}

.ai-ring:nth-child(2){transform:scale(1.4);animation-duration:3.5s;}
.ai-ring:nth-child(3){transform:scale(1.8);animation-duration:5s;}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.loader-text{
  margin-top:18px;
  font-size:14px;
  letter-spacing:1px;
  text-align:center;
  opacity:.9;
}

.ai-dots::after{
  content:"";
  animation:dots 1.4s infinite;
}

@keyframes dots{
  0%{content:""}
  33%{content:"."}
  66%{content:".."}
  100%{content:"..."}
}
</style>
</head>

<body>

<div id="intro">
  <img src="https://www.sanitagida.com/img/beyazlogo.png">
</div>

<div id="app">

  <div id="topBar">
    <button class="homeBtn" onclick="home()">🏠</button>
  </div>

  <div id="main" class="menu hidden">
    <div class="card stok" onclick="openSub('stok')">STOK MİKTARLARI</div>
    <div class="card mal" onclick="openSub('mal')">MAL KABUL</div>
  </div>

  <div id="stok" class="menu hidden">
    <div class="sub mam" onclick="openSheet(urls.mam,'Son ürün miktarlarını inceleyebilirsiniz.')">MAMÜLLER</div>
    <div class="sub hm" onclick="openSheet(urls.hm,'Hammadde Miktarlarını inceleyebilirsiniz.')">HAMMADDELER</div>
    <div class="sub opp" onclick="openSheet(urls.opp,'Bobin Miktarlarını inceleyebilirsiniz.')">BOBİNLER</div>
    <div class="sub omk" onclick="openSheet(urls.omk,'Koli Miktarlarını inceleyebilirsiniz.')">KOLİLER</div>
    <div class="sub pet" onclick="openSheet(urls.pet,'PET - CAM ve KAPAK Miktarlarını inceleyebilirsiniz.')">PET-CAM-KAPAK</div>
  </div>

  <div id="mal" class="menu hidden">
    <div class="sub mh1" onclick="openSheet(urls.mh1,'Mal Kabulü gerçekleşen hammaddeleri inceleyebilirsiniz.')">GELEN HAMMADDE</div>
    <div class="sub mh2" onclick="openSheet(urls.mh2,'Yardımcı malzemeleri inceleyebilirsiniz.')">YARDIMCI MALZEME</div>
  </div>

  <div id="sheet" class="hidden">

    <div id="loader">
      <div class="ai-core">
        <div class="ai-ring"></div>
        <div class="ai-ring"></div>
        <div class="ai-ring"></div>
      </div>
      <div class="loader-text">
        Yapay Zeka Veriyi İşliyor<span class="ai-dots"></span>
      </div>
    </div>

    <div class="frame-shell">
      <iframe id="frame"></iframe>
    </div>

  </div>

</div>

<script>

const urls={
 mam:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=1484746316&single=true",
 hm:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=185627105&single=true",
 opp:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=326121089&single=true",
 omk:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=2101965769&single=true",
 pet:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=1845266626&single=true",
 mh1:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=949894360&single=true",
 mh2:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=908017234&single=true"
};

function openSub(type){
  document.getElementById("main").classList.add("hidden");
  document.getElementById(type).classList.remove("hidden");
}

function openSheet(url,text){

  document.getElementById("stok").classList.add("hidden");
  document.getElementById("mal").classList.add("hidden");

  const sheet=document.getElementById("sheet");
  const frame=document.getElementById("frame");
  const loader=document.getElementById("loader");

  sheet.classList.remove("hidden");

  loader.style.display="flex";

  setTimeout(()=>{
    frame.src=url;
  },250);

  frame.onload=()=>{
    loader.style.display="none";
  };

  speak(text);
}

function home(){
  document.getElementById("sheet").classList.add("hidden");
  document.getElementById("stok").classList.add("hidden");
  document.getElementById("mal").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");
}

function speak(text){
  const msg=new SpeechSynthesisUtterance(text);
  msg.lang="tr-TR";
  speechSynthesis.cancel();
  speechSynthesis.speak(msg);
}

window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("main").classList.remove("hidden");
  },2800);
});

</script>

</body>
</html>
