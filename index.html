<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Stok Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      transition: background 0.5s, color 0.5s;
    }
    .menu-card {
      transition: transform 0.4s ease, box-shadow 0.4s ease;
      cursor: pointer;
    }
    .menu-card:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }
    iframe {
      border: none;
      width: 100%;
      height: 85vh;
      background: #fff;
    }
    .fade-enter {
      animation: fadeIn 0.8s;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
    /* Tema */
    .light-mode {
      background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      color: #1e293b;
    }
    .dark-mode {
      background: radial-gradient(circle at top left, #0f172a, #1e293b);
      color: #f1f5f9;
    }
    /* Sabit üst menü */
    #topBar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
    }
    #topBar button {
      transition: transform 0.3s;
    }
    #topBar button:hover {
      transform: rotate(10deg) scale(1.1);
    }
  </style>
</head>
<body class="dark-mode p-4">
  <!-- Üst Bar -->
  <div id="topBar">
    <button onclick="goHome()" class="text-2xl">🏠</button>
    <button onclick="toggleMode()" class="text-xl">🌞/🌙</button>
  </div>

  <!-- Ana Menü -->
  <div id="mainMenu" class="animate__animated animate__fadeIn h-screen flex flex-col justify-center items-center gap-10">
    <div class="menu-card w-3/4 h-1/4 flex items-center justify-center rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white text-3xl font-bold" onclick="showSubMenu('stok')">
      📦 Stok Miktarları
    </div>
    <div class="menu-card w-3/4 h-1/4 flex items-center justify-center rounded-xl bg-gradient-to-r from-pink-600 to-yellow-500 text-white text-3xl font-bold" onclick="showSubMenu('mal')">
      📥 Mal Kabul
    </div>
  </div>

  <!-- Stok Menü -->
  <div id="stokMenu" class="hidden fade-enter h-screen flex flex-col justify-center items-center gap-6">
    <button class="w-3/4 p-6 rounded-xl bg-indigo-600 text-white text-xl" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=185627105&single=true')">Hammadde</button>
    <button class="w-3/4 p-6 rounded-xl bg-indigo-600 text-white text-xl" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=326121089&single=true')">OPP-BOBİN</button>
    <button class="w-3/4 p-6 rounded-xl bg-indigo-600 text-white text-xl" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=2101965769&single=true')">OMK-KOLİ</button>
    <button class="w-3/4 p-6 rounded-xl bg-indigo-600 text-white text-xl" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=1845266626&single=true')">PET-CAM-KAPAK</button>
  </div>

  <!-- Mal Kabul Menü -->
  <div id="malMenu" class="hidden fade-enter h-screen flex flex-col justify-center items-center gap-6">
    <button class="w-3/4 p-6 rounded-xl bg-purple-600 text-white text-xl" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=949894360&single=true')">Gelen Hammadde</button>
    <button class="w-3/4 p-6 rounded-xl bg-purple-600 text-white text-xl" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=908017234&single=true')">Gelen Yardımcı Malzeme</button>
  </div>

  <!-- Tablo Görüntüleme -->
  <div id="sheetView" class="hidden fade-enter mt-12">
    <iframe id="sheetFrame"></iframe>
  </div>

  <!-- JS -->
  <script>
    function showSubMenu(menu){
      document.getElementById('mainMenu').classList.add('hidden');
      if(menu === 'stok'){
        document.getElementById('stokMenu').classList.remove('hidden');
      } else {
        document.getElementById('malMenu').classList.remove('hidden');
      }
    }
    function openSheet(url){
      document.getElementById('stokMenu').classList.add('hidden');
      document.getElementById('malMenu').classList.add('hidden');
      document.getElementById('sheetView').classList.remove('hidden');
      document.getElementById('sheetFrame').src = url;
    }
    function goHome(){
      document.getElementById('stokMenu').classList.add('hidden');
      document.getElementById('malMenu').classList.add('hidden');
      document.getElementById('sheetView').classList.add('hidden');
      document.getElementById('mainMenu').classList.remove('hidden');
    }
    function toggleMode(){
      const body = document.body;
      if(body.classList.contains('dark-mode')){
        body.classList.remove('dark-mode');
        body.classList.add('light-mode');
      } else {
        body.classList.remove('light-mode');
        body.classList.add('dark-mode');
      }
    }
  </script>
</body>
</html>
