<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sanita Stok Kiosk</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;font-family:Segoe UI;height:100dvh;overflow:hidden;background:#0f172a;color:white;}

#voiceSelect{
  position:absolute;inset:0;
  background:linear-gradient(135deg,#0f172a,#111827);
  display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:999;
  gap:20px;text-align:center;
}

.voiceBtn{
  width:140px;height:140px;border-radius:20px;
  font-size:60px;display:flex;align-items:center;justify-content:center;
  background:#1f2937;
}

#app{height:100dvh;display:grid;grid-template-rows:auto 1fr;}
#topBar{display:flex;justify-content:center;padding:12px;background:rgba(0,0,0,0.5);}
.homeBtn{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.menu{display:flex;flex-direction:column;height:100%;}
.card{flex:1;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:bold;}
.stok{background:linear-gradient(135deg,#4f46e5,#7c3aed);}
.mal{background:linear-gradient(135deg,#f97316,#ef4444);}
.sub{flex:1;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;}
.hidden{display:none!important;}

.hm{background:#4338ca;}
.opp{background:#dc2626;}
.omk{background:#2563eb;}
.pet{background:#15803d;}
.mh1{background:#7c3aed;}
.mh2{background:#be185d;}

#sheet{height:100%;padding:10px;}
iframe{width:100%;height:100%;border:none;border-radius:15px;}
</style>
</head>

<body>

<!-- VOICE SELECT -->
<div id="voiceSelect">
  <div style="font-size:22px;font-weight:bold;">Ses Asistanını Seç</div>

  <div style="display:flex;gap:20px;">
    <div class="voiceBtn" onclick="selectVoice('female')">👩‍🦰</div>
    <div class="voiceBtn" onclick="selectVoice('male')">👨‍🦱</div>
  </div>

  <div style="opacity:0.6;font-size:14px;">Ses sistemi yükleniyor...</div>
</div>

<div id="app">

  <div id="topBar">
    <button class="homeBtn" onclick="home()">🏠</button>
  </div>

  <div id="main" class="menu hidden">
    <div class="card stok" onclick="openSub('stok')">Stok Miktarları</div>
    <div class="card mal" onclick="openSub('mal')">Mal Kabul</div>
  </div>

  <div id="stok" class="menu hidden">
    <div class="sub hm" onclick="openSheet(urls.hm,'Hammadde Miktarlarını inceleyebilirsiniz.')">Hammadde</div>
    <div class="sub opp" onclick="openSheet(urls.opp,'Bobin Miktarlarını inceleyebilirsiniz.')">OPP - BOBİN</div>
    <div class="sub omk" onclick="openSheet(urls.omk,'Koli Miktarlarını inceleyebilirsiniz.')">OMK - KOLİ</div>
    <div class="sub pet" onclick="openSheet(urls.pet,'PET - CAM ve KAPAK Miktarlarını inceleyebilirsiniz.')">PET</div>
  </div>

  <div id="mal" class="menu hidden">
    <div class="sub mh1" onclick="openSheet(urls.mh1,'Mal Kabulü gerçekleşen hammaddeleri inceyebilirsiniz.')">Gelen Hammadde</div>
    <div class="sub mh2" onclick="openSheet(urls.mh2,'Mal kabulü gerçekleşen ambalaj , koli , kapak , şişe ve benzeri malzemeleri inceleyebilirsiniz.')">Yardımcı Malzeme</div>
  </div>

  <div id="sheet" class="hidden">
    <iframe id="frame"></iframe>
  </div>

</div>

<script>
const urls={
 hm:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=185627105&single=true",
 opp:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=326121089&single=true",
 omk:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=2101965769&single=true",
 pet:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=1845266626&single=true",
 mh1:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=949894360&single=true",
 mh2:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=908017234&single=true"
};

let voiceType=null;
let voicesReady=false;

/* VOICE CACHE FIX */
function loadVoices(){
  const v=speechSynthesis.getVoices();
  if(v.length>0) voicesReady=true;
  return v;
}

speechSynthesis.onvoiceschanged=loadVoices;

/* FULLSCREEN */
function goFull(){
  const el=document.documentElement;
  if(el.requestFullscreen) el.requestFullscreen();
}

/* VOICE SELECT */
function selectVoice(type){
  voiceType=type;

  document.getElementById("voiceSelect").style.display="none";
  document.getElementById("main").classList.remove("hidden");

  goFull();

  speak("Ben SANİTA Stok ve Mal Kabul Asistanıyım, nasıl yardımcı olabilirim?");
}

/* NAV */
function openSub(type){
  document.getElementById("main").classList.add("hidden");
  document.getElementById(type).classList.remove("hidden");

  speak(type==="stok"
    ? "Stok Miktarlarını inceleyebilirsiniz."
    : "Mal Kabul detaylarını inceyebilirsiniz."
  );
}

/* SHEET */
function openSheet(url,text){
  document.getElementById("stok").classList.add("hidden");
  document.getElementById("mal").classList.add("hidden");
  document.getElementById("sheet").classList.remove("hidden");

  document.getElementById("frame").src=url;
  speak(text);
}

/* HOME */
function home(){
  document.getElementById("sheet").classList.add("hidden");
  document.getElementById("stok").classList.add("hidden");
  document.getElementById("mal").classList.add("hidden");
  document.getElementById("main").classList.remove("hidden");

  speak("Anasayfa'ya geri döndünüz.");
}

/* 🔊 %100 FIXED SPEECH ENGINE */
function speak(text){

  const run=()=>{
    const msg=new SpeechSynthesisUtterance(text);
    msg.lang="tr-TR";
    msg.rate=0.95;

    const voices=loadVoices();

    function pickVoice(){
      // 1 GOOGLE VOICES (en doğal)
      let v=voices.find(v=>
        v.lang.includes("tr") &&
        v.name.toLowerCase().includes("google")
      );

      // 2 GENDER FIX (GERÇEK DÜZELTME)
      if(!v){
        v=voices.find(v=>{
          if(!v.lang.includes("tr")) return false;

          const n=v.name.toLowerCase();

          if(voiceType==="female"){
            return n.includes("female") || n.includes("zira") || n.includes("tr") && !n.includes("male");
          }else{
            return n.includes("male") || n.includes("david") || n.includes("tr");
          }
        });
      }

      // 3 fallback
      if(!v){
        v=voices.find(v=>v.lang.includes("tr"));
      }

      return v;
    }

    const selected=pickVoice();
    if(selected) msg.voice=selected;

    speechSynthesis.cancel();
    speechSynthesis.speak(msg);
  };

  // voice delay fix
  if(!voicesReady){
    let i=0;
    const t=setInterval(()=>{
      loadVoices();
      i++;
      if(voicesReady || i>10){
        clearInterval(t);
        run();
      }
    },150);
  }else{
    run();
  }
}

/* 🚀 İLK MESAJ (KESİN ÇALIŞIR) */
window.addEventListener("load",()=>{
  let i=0;

  const t=setInterval(()=>{
    const v=speechSynthesis.getVoices();
    if(v.length>0){
      clearInterval(t);

      const msg=new SpeechSynthesisUtterance(
        "LÜTFEN SİZE YARDIMCI OLMASINI İSTEDİĞİNİZ ASİSTANINIZI SEÇİNİZ"
      );

      msg.lang="tr-TR";
      msg.rate=0.95;

      // ERKEK SES ZORLAMASI
      let male=v.find(x=>x.lang.includes("tr") && x.name.toLowerCase().includes("male"))
              || v.find(x=>x.lang.includes("tr"));

      if(male) msg.voice=male;

      speechSynthesis.cancel();
      speechSynthesis.speak(msg);
    }

    i++;
    if(i>15) clearInterval(t);
  },200);
});
</script>

</body>
</html>
