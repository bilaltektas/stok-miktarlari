<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Stok Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100dvh;
    overflow: hidden;
  }

  .dark-mode {
    background: #0f172a;
    color: white;
  }

  #app {
    height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr;
  }

  #topBar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    justify-content: space-between;
    padding: 10px 15px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
  }

  .hidden { display: none !important; }

  /* MAIN MENU */
  #mainMenu {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .menu-card {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
  }

  .stok { background: linear-gradient(135deg,#4f46e5,#7c3aed); }
  .mal  { background: linear-gradient(135deg,#f97316,#ef4444); }

  /* 🔥 ALT MENÜ FULL SCREEN + EŞİT BLOK */
  .subMenu {
    height: 100%;
    display: flex;
    flex-direction: column;
  }

  .subItem {
    flex: 1; /* eşit oran */
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .subItem:hover {
    transform: scale(1.02);
  }

  /* STOK RENKLERİ */
  .hm  { background: linear-gradient(135deg,#6366f1,#4338ca); }
  .opp { background: linear-gradient(135deg,#f97316,#dc2626); }
  .omk { background: linear-gradient(135deg,#06b6d4,#2563eb); }
  .pet { background: linear-gradient(135deg,#22c55e,#15803d); }

  /* MAL RENKLERİ */
  .mh1 { background: linear-gradient(135deg,#a855f7,#7c3aed); }
  .mh2 { background: linear-gradient(135deg,#ec4899,#be185d); }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    background: white;
  }

  #sheetView {
    height: 100%;
  }
</style>
</head>

<body class="dark-mode">

<div id="app">

  <!-- TOP BAR -->
  <div id="topBar">
    <button onclick="home()">🏠</button>
    <button onclick="toggle()">🌙</button>
  </div>

  <!-- MAIN MENU -->
  <div id="mainMenu">

    <div class="menu-card stok" onclick="showSubMenu('stok')">
      📦 Stok Miktarları
    </div>

    <div class="menu-card mal" onclick="showSubMenu('mal')">
      📥 Mal Kabul
    </div>

  </div>

  <!-- 🔥 STOK ALT MENÜ (FULL SCREEN RENKLİ BLOKLAR) -->
  <div id="stokMenu" class="hidden subMenu">

    <div class="subItem hm" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=185627105&single=true')">
      Hammadde
    </div>

    <div class="subItem opp" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=326121089&single=true')">
      OPP - BOBİN
    </div>

    <div class="subItem omk" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=2101965769&single=true')">
      OMK - KOLİ
    </div>

    <div class="subItem pet" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=1845266626&single=true')">
      PET - CAM - KAPAK
    </div>

  </div>

  <!-- 🔥 MAL ALT MENÜ -->
  <div id="malMenu" class="hidden subMenu">

    <div class="subItem mh1" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=949894360&single=true')">
      Gelen Hammadde
    </div>

    <div class="subItem mh2" onclick="openSheet('https://docs.google.com/spreadsheets/d/e/2PACX-1vTNqOxfs7HAd05KsWVVL14sgKoLnR3vRnRFxeF-9geymh2lMOvjZH-agNftjODzzDhXd3vaT-7sDTQC/pubhtml?gid=908017234&single=true')">
      Yardımcı Malzeme
    </div>

  </div>

  <!-- SHEET VIEW -->
  <div id="sheetView" class="hidden" style="height:100%;">
    <iframe id="frame"></iframe>
  </div>

</div>

<script>

function showSubMenu(menu){
  document.getElementById("mainMenu").classList.add("hidden");

  if(menu === "stok"){
    document.getElementById("stokMenu").classList.remove("hidden");
  } else {
    document.getElementById("malMenu").classList.remove("hidden");
  }
}

function openSheet(url){
  document.getElementById("stokMenu").classList.add("hidden");
  document.getElementById("malMenu").classList.add("hidden");
  document.getElementById("sheetView").classList.remove("hidden");
  document.getElementById("frame").src = url;
}

function home(){
  document.getElementById("stokMenu").classList.add("hidden");
  document.getElementById("malMenu").classList.add("hidden");
  document.getElementById("sheetView").classList.add("hidden");
  document.getElementById("mainMenu").classList.remove("hidden");
}

function toggle(){
  document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
